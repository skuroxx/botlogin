<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discord Portal</title>
    <style>
        body { font-family: Arial, sans-serif; background: #202225; color: white; text-align: center; padding-top: 100px; }
        .btn { padding: 10px 20px; background: #5865F2; color: white; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; font-weight: bold;}
    </style>
</head>
<body>
    <div id="view">
        <h1>Loading Portal...</h1>
    </div>

    <script>
        // REPLACE WITH YOUR VPS PUBLIC IP OR DOMAIN
        const VPS_URL = "http://YOUR_VPS_IP:5000"; 

        // Check if user is already logged into this browser session
        const username = localStorage.getItem("username");
        const discordId = localStorage.getItem("discord_id");
        const view = document.getElementById("view");

        if (username) {
            view.innerHTML = `
                <h1>Welcome back, ${username}!</h1>
                <p>ID: ${discordId}</p>
                <button class="btn" onclick="logout()">Logout</button>
            `;
        } else {
            view.innerHTML = `
                <h1>Gateway Access</h1>
                <p>Login using your Discord Account</p>
                <button class="btn" onclick="login()">Login with Discord</button>
            `;
        }

        function login() {
            // Ask VPS for the unique Discord login URL
            fetch(`${VPS_URL}/api/login-url`)
                .then(res => res.json())
                .then(data => window.location.href = data.url);
        }

        function logout() {
            localStorage.clear();
            window.location.reload();
        }
    </script>
</body>
</html>
