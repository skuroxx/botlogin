<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> C# Cloud IDE (Stable Build)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Monaco Editor Direct Core Stylesheets -->
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/editor/editor.main.min.css">
</head>
<body id="appBody" class="bg-[#0F1015] text-gray-200 min-h-screen flex flex-col font-sans select-none">

    <!-- TOP CONTROL NAVIGATION -->
    <header id="appHeader" class="border-b border-zinc-800 bg-[#16171D] px-6 py-4 flex flex-wrap items-center justify-between gap-4">
        <div class="flex items-center gap-3">
            <div class="h-3 w-3 rounded-full bg-purple-500 animate-pulse"></div>
            <h1 class="text-xs font-mono tracking-[0.2em] text-zinc-400 uppercase font-bold"> C# Engine</h1>
        </div>

        <div class="flex items-center gap-3 flex-wrap">
            <!-- Template Selector -->
            <div class="flex items-center gap-2 bg-zinc-900/80 border border-zinc-800 rounded px-2.5 py-1.5">
                <i class="fa-solid fa-code text-xs text-purple-400"></i>
                <select id="snippetSelect" class="bg-transparent text-xs font-mono text-zinc-300 focus:outline-none cursor-pointer">
                    <option value="welcome">Template: Hello World</option>
                    <option value="loop">Template: Advanced Loops</option>
                    <option value="method">Template: Custom Classes</option>
                </select>
            </div>

            <!-- Theme Toggle Button -->
            <button id="themeToggleBtn" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-300 p-2.5 rounded text-xs border border-zinc-700/50">
                <i id="themeIcon" class="fa-solid fa-sun text-amber-400"></i>
            </button>

            <!-- PRIMARY COMPILATION TRIGGER -->
            <button id="compileBtn" class="bg-purple-600 hover:bg-purple-500 active:scale-95 text-white text-xs font-mono font-bold uppercase tracking-widest px-6 py-2.5 transition-all flex items-center gap-2 shadow-[0_0_15px_rgba(147,51,234,0.3)] rounded">
                <i class="fa-solid fa-play"></i> Run Application
            </button>
        </div>
    </header>

    <!-- MAIN IDE WORKSPACE PANE -->
    <main class="flex-1 relative h-[calc(100vh-73px)] bg-[#0F1015]">
        <!-- Fallback Message visible ONLY if Monaco fails to load -->
        <div id="editorFallback" class="absolute inset-0 flex flex-col items-center justify-center text-center p-6 z-0">
            <i class="fa-solid fa-triangle-exclamation text-amber-500 text-4xl mb-4 animate-bounce"></i>
            <h3 class="text-sm font-bold tracking-wider uppercase text-zinc-300">Loading IDE Mainframe Environment...</h3>
            <p class="text-xs text-zinc-500 max-w-md mt-2 leading-relaxed">
                If this text remains here for more than 5 seconds, your browser is blocking the online script packages or you are currently offline.
            </p>
        </div>
        
        <!-- Full Screen Monaco Frame Mount -->
        <div id="editorContainer" class="w-full h-full relative z-10"></div>
    </main>

    <!-- DEDICATED EXECUTION OUTPUT MODAL -->
    <div id="terminalModal" class="fixed inset-0 z-50 bg-black/70 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="bg-[#0A0B0E] border border-zinc-800 w-full max-w-3xl h-[500px] rounded-lg shadow-2xl flex flex-col overflow-hidden">
            <div class="bg-[#121318] border-b border-zinc-800 px-5 py-3.5 flex items-center justify-between">
                <div class="flex items-center gap-2 text-xs font-mono text-zinc-400 font-bold uppercase tracking-wider">
                    <i class="fa-solid fa-terminal text-emerald-400"></i> Local Runtime Terminal Window
                </div>
                <button id="closeModalBtn" class="text-zinc-500 hover:text-white text-sm"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="flex-1 p-6 bg-black font-mono text-xs overflow-y-auto leading-relaxed select-text">
                <pre id="terminalOutput" class="whitespace-pre-wrap text-emerald-400"></pre>
            </div>
            <div class="bg-[#121318] border-t border-zinc-800 px-5 py-3 flex justify-end gap-2">
                <button id="clearLogBtn" class="px-4 py-2 bg-zinc-800 text-zinc-400 text-xs font-mono rounded">Clear Logs</button>
                <button id="modalCloseAction" class="px-4 py-2 bg-purple-600 text-white text-xs font-mono rounded">Return to Workspace</button>
            </div>
        </div>
    </div>

    <!-- Monoco Global Environment Paths Configuration -->
    <script>
        var MonacoEnvironment = {
            getWorkerUrl: function(workerId, label) {
                return `data:text/javascript;charset=utf-8,${encodeURIComponent(`
                    self.MonacoEnvironment = { baseUrl: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/' };
                    importScripts('https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/base/worker/workerMain.js');
                `)}`;
            }
        };
    </script>
    
    <!-- Direct Dependency Core Components -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/loader.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/editor/editor.main.nls.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/editor/editor.main.min.js"></script>

    <!-- MAIN WORKSPACE APPLICATION CONTROLLER -->
    <script>
        let editor;
        let isDarkMode = true;

        const snippets = {
            welcome: `using System;\n\nnamespace LocalIDE\n{\n    public class Program\n    {\n        public static void Main(string[] args)\n        {\n            Console.WriteLine("Hello World! Workspace loaded successfully.");\n            Console.WriteLine("Try typing 'Console.' to check suggestions.");\n        }\n    }\n}`,
            loop: `using System;\n\nnamespace LoopDemo\n{\n    public class Program\n    {\n        public static void Main(string[] args)\n        {\n            string[] heroes = { "Batman", "Robin", "Nightwing" };\n            foreach (var hero in heroes)\n            {\n                Console.WriteLine($"Secured by: {hero}");\n            }\n        }\n    }\n}`,
            method: `using System;\n\nnamespace ClassDemo\n{\n    public class Program\n    {\n        public static void Main(string[] args)\n        {\n            Console.WriteLine("System Core Computation Complete.");\n        }\n    }\n}`
        };

        // Fire Initialization directly now that dependencies are flat-loaded
        try {
            // Hide the fallback spinner text screen
            document.getElementById('editorFallback').classList.add('hidden');

            editor = monaco.editor.create(document.getElementById('editorContainer'), {
                value: snippets.welcome,
                language: 'csharp',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 14,
                fontFamily: 'Consolas, Fira Code, monospace',
                minimap: { enabled: true },
                wordBasedSuggestions: true,
                suggestOnTriggerCharacters: true
            });
        } catch (e) {
            console.error("Monaco creation crashed, revealing fallback text context:", e);
            document.getElementById('editorFallback').classList.remove('hidden');
        }

        // TERMINAL DISPLAY ACTION CHANNELS
        const terminalModal = document.getElementById('terminalModal');
        const terminalOutput = document.getElementById('terminalOutput');

        function openTerminalWindow() { terminalModal.classList.remove('hidden'); }
        function closeTerminalWindow() { terminalModal.classList.add('hidden'); }

        document.getElementById('closeModalBtn').addEventListener('click', closeTerminalWindow);
        document.getElementById('modalCloseAction').addEventListener('click', closeTerminalWindow);
        document.getElementById('clearLogBtn').addEventListener('click', () => terminalOutput.innerText = "");

        // EXECUTING CODE PIPELINE
        document.getElementById('compileBtn').addEventListener('click', async () => {
            if(!editor) return alert("The editor script engine hasn't initialized completely yet.");
            openTerminalWindow();
            terminalOutput.innerText = ">> Sending build context to secure remote runtime compiler...\n";
            terminalOutput.className = "text-amber-400 whitespace-pre-wrap";

            try {
                const response = await fetch('https://api.codex.jaagrav.in', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        language: 'cs',
                        code: editor.getValue()
                    })
                });
                const data = await response.json();

                if (data.output && data.output !== "") {
                    terminalOutput.innerText = `[Process Success]\n\n${data.output}`;
                    terminalOutput.className = "text-emerald-400 whitespace-pre-wrap";
                } else if (data.error && data.error !== "") {
                    terminalOutput.innerText = `[Compilation Error]\n\n${data.error}`;
                    terminalOutput.className = "text-red-400 whitespace-pre-wrap";
                } else {
                    terminalOutput.innerText = "[Process Finished with empty execution streams]";
                    terminalOutput.className = "text-zinc-400 italic";
                }
            } catch (err) {
                terminalOutput.innerText = `CRITICAL FAILURE: Pipeline tracking drop.\n${err.message}`;
                terminalOutput.className = "text-red-600 font-bold";
            }
        });

        // UTILITY ADJUSTMENT BINDINGS
        document.getElementById('snippetSelect').addEventListener('change', (e) => {
            if(editor && snippets[e.target.value]) editor.setValue(snippets[e.target.value]);
        });

        document.getElementById('themeToggleBtn').addEventListener('click', () => {
            if(!editor) return;
            isDarkMode = !isDarkMode;
            const appBody = document.getElementById('appBody');
            const appHeader = document.getElementById('appHeader');
            const themeIcon = document.getElementById('themeIcon');

            if(isDarkMode) {
                monaco.editor.setTheme('vs-dark');
                appBody.className = "bg-[#0F1015] text-gray-200 min-h-screen flex flex-col font-sans select-none";
                appHeader.className = "border-b border-zinc-800 bg-[#16171D] px-6 py-4 flex flex-wrap items-center justify-between gap-4";
                themeIcon.className = "fa-solid fa-sun text-amber-400";
            } else {
                monaco.editor.setTheme('vs-light');
                appBody.className = "bg-zinc-50 text-zinc-900 min-h-screen flex flex-col font-sans select-none";
                appHeader.className = "border-b border-zinc-200 bg-white px-6 py-4 flex flex-wrap items-center justify-between gap-4 shadow-sm";
                themeIcon.className = "fa-solid fa-moon text-indigo-600";
            }
        });
    </script>
</body>
</html>
